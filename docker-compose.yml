version: '3.8'

services:

  # ─── GATEWAY ────────────────────────────────────────────────────────────────
  # Public-facing API gateway. All frontend requests go through here.
  # Routes to access-management and recommendation internally.
  gateway:
    build:
      context: ./nextGen-IGA-tool/gateway
    restart: always                          # Auto-restart if container crashes
    ports:
      - "3000:3000"                          # Expose to host — frontend calls this
    environment:
      - PORT=3000
      - ACCESS_MGMT_URL=http://access-management:3001      # Internal Docker DNS
      - RECOMMENDATION_URL=http://recommendation:3002      # Internal Docker DNS
      - NATS_URL=${NATS_URL:-nats://54.224.250.252:4222}   # External NATS broker
      - DB_HOST=${DB_HOST:-13.206.205.158}                 # External MySQL EC2
      - DB_USER=${DB_USER:-abhik}
      - DB_PASSWORD=${DB_PASSWORD:-abhikSQL}
      - DB_NAME=${DB_NAME:-abhik_db}
      - EXTERNAL_AUTH_URL=${EXTERNAL_AUTH_URL:-http://18.60.129.12:8080}  # External auth
    networks:
      - iga-network
    depends_on:
      - access-management                    # Start these before gateway
      - recommendation

  # ─── ACCESS MANAGEMENT ──────────────────────────────────────────────────────
  # Handles user roles, permissions, and access control.
  # Called by gateway, also subscribes to NATS events.
  access-management:
    build:
      context: ./nextGen-IGA-tool/access-management
    restart: always
    ports:
      - "3001:3001"                          # Exposed for direct debugging if needed
    environment:
      - ACCESS_MGMT_PORT=3001
      - NATS_URL=${NATS_URL:-nats://54.224.250.252:4222}
      - DB_HOST=${DB_HOST:-13.206.205.158}
      - DB_USER=${DB_USER:-abhik}
      - DB_PASSWORD=${DB_PASSWORD:-abhikSQL}
      - DB_NAME=${DB_NAME:-abhik_db}
    networks:
      - iga-network

  # ─── EVENT MANAGER ──────────────────────────────────────────────────────────
  # Stateless event processor. Subscribes to NATS and routes events.
  # No HTTP port — purely NATS-driven.
  event-manager:
    build:
      context: ./nextGen-IGA-tool/event-manager
    restart: always
    environment:
      - NATS_URL=${NATS_URL:-nats://54.224.250.252:4222}
    networks:
      - iga-network

  # ─── NOTIFICATIONS ──────────────────────────────────────────────────────────
  # Listens to NATS events and sends notifications.
  # Persists notification records to MySQL.
  # No HTTP port — purely NATS-driven.
  notifications:
    build:
      context: ./nextGen-IGA-tool/notifications
    restart: always
    environment:
      - NATS_URL=${NATS_URL:-nats://54.224.250.252:4222}
      - DB_HOST=${DB_HOST:-13.206.205.158}
      - DB_USER=${DB_USER:-abhik}
      - DB_PASSWORD=${DB_PASSWORD:-abhikSQL}
      - DB_NAME=${DB_NAME:-abhik_db}
    networks:
      - iga-network

  # ─── RECOMMENDATION ─────────────────────────────────────────────────────────
  # Generates access/role recommendations.
  # Called by gateway internally, also uses NATS and MySQL.
  recommendation:
    build:
      context: ./nextGen-IGA-tool/recommendation
    restart: always
    ports:
      - "3002:3002"                          # Exposed for direct debugging if needed
    environment:
      - PORT=3002
      - NATS_URL=${NATS_URL:-nats://54.224.250.252:4222}
      - DB_HOST=${DB_HOST:-13.206.205.158}
      - DB_USER=${DB_USER:-abhik}
      - DB_PASSWORD=${DB_PASSWORD:-abhikSQL}
      - DB_NAME=${DB_NAME:-abhik_db}
    networks:
      - iga-network

  # ─── FRONTEND ───────────────────────────────────────────────────────────────
  # React/Vite SPA served by Nginx on port 80.
  # VITE_API_BASE_URL must be passed as build ARG (not just env) —
  # Vite bakes it into the JS bundle at build time.
  frontend:
    build:
      context: ./nextgen-iga-frontend
      args:
        # This passes the IP into the Dockerfile ARG → ENV → npm run build
        # Change this IP if your EC2 public IP changes
        - VITE_API_BASE_URL=http://54.167.248.162:3000
    restart: always
    ports:
      - "80:80"                              # Public HTTP port
    depends_on:
      - gateway                              # Wait for gateway before starting
    networks:
      - iga-network

# ─── NETWORKS ─────────────────────────────────────────────────────────────────
# Explicit bridge network — all services can reach each other by service name
# e.g. gateway can call http://access-management:3001 directly
networks:
  iga-network:
    driver: bridge